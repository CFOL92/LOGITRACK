<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <title>LOGITRACK | Control de Ruta</title>

  <!-- Leaflet Mapa -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- LOGITRACK CSS MODULAR -->
  <link rel="stylesheet" href="./css/base.css?v=1.1">
  <link rel="stylesheet" href="./css/login.css?v=1.1">
  <link rel="stylesheet" href="./css/app-shell.css?v=1.1">
  <link rel="stylesheet" href="./css/ruta.css?v=1.1">
  <link rel="stylesheet" href="./css/mapa.css?v=1.1">
  <link rel="stylesheet" href="./css/panel.css?v=1.1">
  <link rel="stylesheet" href="./css/responsive.css?v=1.1">
</head>

<body class="zoom-low">

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">🚚</div>
        <div>
          <h1>LOGITRACK</h1>
          <small>Control de ruta por chofer</small>
        </div>
      </div>

      <div class="form-group">
        <label for="ciInput">Cédula de identidad</label>
        <input id="ciInput" type="text" placeholder="Ej: 1234567" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="chapaInput">Chapa del móvil</label>
        <input id="chapaInput" type="text" placeholder="Ej: AAHT556" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="fechaInput">Fecha de ruta</label>
        <input id="fechaInput" type="date" />
      </div>

      <button id="btnLogin" class="btn-primary" onclick="window.cargarRutaChofer(true)">Cargar mi ruta</button>

      <div id="loginMsg" class="login-msg">
        Ingrese CI, chapa y fecha para consultar la ruta asignada.
      </div>
    </div>
  </div>

  <div id="appShell" class="app-shell">
    <div class="app-header">
      <div class="app-title-row">
        <div>
          <div class="app-title">LOGITRACK</div>
          <div id="appDriverMeta" class="app-subtitle">Ruta no cargada</div>
        </div>
        <div id="appRouteStatus" class="route-pill">Ruta activa</div>
      </div>
    </div>

    <div id="viewInicio" class="app-view">
      <div id="inicioContent"></div>
    </div>

    <div id="viewRuta" class="app-view">
      <div id="rutaContent"></div>
    </div>

    <div id="viewCierre" class="app-view">
      <div id="cierreContent"></div>
    </div>
  </div>

  <nav id="bottomNav" class="bottom-nav">
    <button id="navInicio" class="nav-item active" onclick="window.cambiarVista('inicio')">
      <span class="nav-icon">🏠</span>
      Inicio
    </button>
    <button id="navRuta" class="nav-item" onclick="window.cambiarVista('ruta')">
      <span class="nav-icon">📋</span>
      Ruta
    </button>
    <button id="navMapa" class="nav-item" onclick="window.cambiarVista('mapa')">
      <span class="nav-icon">🗺️</span>
      Mapa
    </button>
    <button id="navCierre" class="nav-item" onclick="window.cambiarVista('cierre')">
      <span class="nav-icon">🏁</span>
      Cierre
    </button>
  </nav>

  <div id="topPanel" class="top-panel">
    <div class="driver-box">
      <div id="driverName" class="driver-name">Sin chofer</div>
      <div id="driverMeta" class="driver-meta">Sin ruta cargada</div>
    </div>

    <div class="stats-grid">
      <div class="stat"><b id="statPuntos">0</b><span>Puntos</span></div>
      <div class="stat"><b id="statFacturas">0</b><span>Facturas</span></div>
      <div class="stat"><b id="statPeso">0</b><span>Kg</span></div>
      <div class="stat"><b id="statPallets">0</b><span>Pallets</span></div>
    </div>

    <div class="panel-actions">
      <button class="btn-success" onclick="window.activarGPS()">📍 Mi ubicación</button>
      <button class="btn-secondary" onclick="window.refrescarRuta()">🔄 Refrescar ruta</button>
      <button class="btn-danger" onclick="window.finalizarRuta()">🏁 Finalizar ruta</button>
      <button class="btn-secondary" onclick="window.salir()">Cambiar chofer</button>
    </div>

    <div id="apiStatus" class="status-line">API: CONECTANDO...</div>
  </div>

  <div id="sidePanel" class="side-panel">
    <div class="side-header">
      <div>
        <h2 id="sideTitle" class="side-title">Detalle</h2>
        <div id="sideSubtitle" class="side-subtitle"></div>
      </div>
      <button class="side-close" onclick="window.cerrarPanel()">×</button>
    </div>
    <div id="sideBody" class="side-body"></div>
  </div>

  <div id="map"></div>
  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const SHEET_API = "https://script.google.com/macros/s/AKfycbw4MMDN7k9m9V34L62FDWryaed0iPQZhWqVIC37G7SXNjS8m-vxvthHmiuX70len8-9/exec";

    const state = {
      ci: "",
      chapa: "",
      fecha: "",
      chofer: null,
      movil: null,
      resumen: null,
      paradas: [],
      paradasMap: {},
      facturasCache: {},
      productosCache: {},
      paradaActiva: null,
      facturaActiva: null,
      vistaActiva: "inicio",
      filtroRuta: "TODOS"
    };

    const formatoNum = new Intl.NumberFormat("es-PY", { maximumFractionDigits: 2 });
    const formatoGs = new Intl.NumberFormat("es-PY", { maximumFractionDigits: 0 });

    const map = L.map("map", { zoomControl: false }).setView([-25.30, -57.60], 11);
    L.control.zoom({ position: "bottomright" }).addTo(map);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    const layerGroup = L.layerGroup().addTo(map);
    let userMarker = null;

    map.on("zoomend", () => {
      const z = map.getZoom();
      document.body.classList.toggle("zoom-high", z >= 14);
      document.body.classList.toggle("zoom-low", z < 14);
    });

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("fechaInput").value = fechaHoyISO();
      verificarAPI();
    });

    function fechaHoyISO() {
      const d = new Date();
      const offset = d.getTimezoneOffset();
      const local = new Date(d.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    async function apiGet(params) {
      const url = `${SHEET_API}?${new URLSearchParams(params).toString()}`;
      const response = await fetch(url, { redirect: "follow" });
      return await response.json();
    }

    async function verificarAPI() {
      try {
        const data = await apiGet({ mode: "status" });
        document.getElementById("apiStatus").textContent = data.ok ? "API: CONECTADA" : "API: ERROR";
      } catch (error) {
        document.getElementById("apiStatus").textContent = "API: ERROR";
      }
    }

    window.cargarRutaChofer = async function(showLoginErrors) {
      const ci = document.getElementById("ciInput").value.trim();
      const chapa = document.getElementById("chapaInput").value.trim().toUpperCase();
      const fecha = document.getElementById("fechaInput").value.trim();

      if (!ci || !chapa || !fecha) {
        setLoginMsg("Debe ingresar CI, chapa y fecha.", true);
        return;
      }

      state.ci = ci;
      state.chapa = chapa;
      state.fecha = fecha;

      const btn = document.getElementById("btnLogin");
      btn.disabled = true;
      btn.textContent = "Cargando...";

      try {
        const data = await apiGet({
          mode: "loginRuta",
          ci,
          chapa,
          fecha
        });

        if (!data.ok) {
          setLoginMsg(data.mensaje || "No se pudo cargar la ruta.", true);
          return;
        }

        state.chofer = data.chofer;
        state.movil = data.movil;
        state.resumen = data.resumen;
        state.paradas = data.data || [];
        state.paradasMap = {};

        state.paradas.forEach(p => {
          state.paradasMap[String(p.ParadaID || `${p.RutaID}|${p.CodBoca}`)] = p;
        });

        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("bottomNav").classList.add("active");

        actualizarPanelChofer();
        actualizarAppHeader();
        dibujarMapa();
        renderInicio();
        renderRuta();
        renderCierre();

        window.cambiarVista(state.vistaActiva || "inicio");

        toast("Ruta cargada correctamente.", "ok");

      } catch (error) {
        setLoginMsg("Error al conectar con LOGITRACK:\n" + error.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = "Cargar mi ruta";
      }
    };

    window.cambiarVista = function(vista) {
      state.vistaActiva = vista;

      const appShell = document.getElementById("appShell");
      const topPanel = document.getElementById("topPanel");

      ["Inicio", "Ruta", "Mapa", "Cierre"].forEach(nombre => {
        const nav = document.getElementById("nav" + nombre);
        if (nav) nav.classList.remove("active");
      });

      document.querySelectorAll(".app-view").forEach(v => v.classList.remove("active"));

      if (vista === "mapa") {
        appShell.classList.remove("active");
        topPanel.classList.add("active");
        document.getElementById("navMapa").classList.add("active");

        setTimeout(() => {
          map.invalidateSize();
          dibujarMapa();
        }, 150);

        return;
      }

      topPanel.classList.remove("active");
      appShell.classList.add("active");

      if (vista === "inicio") {
        document.getElementById("viewInicio").classList.add("active");
        document.getElementById("navInicio").classList.add("active");
        renderInicio();
      }

      if (vista === "ruta") {
        document.getElementById("viewRuta").classList.add("active");
        document.getElementById("navRuta").classList.add("active");
        renderRuta();
      }

      if (vista === "cierre") {
        document.getElementById("viewCierre").classList.add("active");
        document.getElementById("navCierre").classList.add("active");
        renderCierre();
      }
    };

    function actualizarAppHeader() {
      const chofer = state.chofer || {};
      const movil = state.movil || {};

      document.getElementById("appDriverMeta").innerHTML =
        `${escapeHtml(chofer.chofer || "Chofer")}<br>` +
        `Chapa: ${escapeHtml(movil.chapa || "")} | Fecha: ${escapeHtml(state.fecha || "")}`;

      document.getElementById("appRouteStatus").textContent = "Ruta activa";
    }

    function calcularEstadoRuta() {
      const totalPuntos = state.paradas.length;

      const pendientes = state.paradas.filter(p => {
        const estado = cleanEstado(p.EstadoParada || "PENDIENTE");
        const tienePendiente = cleanEstado(p.TienePendientes || "");
        return estado === "PENDIENTE" || tienePendiente === "SI";
      }).length;

      const entregados = state.paradas.filter(p => {
        const estado = cleanEstado(p.EstadoParada || "");
        return estado === "ENTREGADO";
      }).length;

      const parciales = state.paradas.filter(p => {
        const estado = cleanEstado(p.EstadoParada || "");
        return estado === "PARCIAL";
      }).length;

      const rechazados = state.paradas.filter(p => {
        const estado = cleanEstado(p.EstadoParada || "");
        return estado === "RECHAZADO" || estado === "NO_DESPACHADO";
      }).length;

      const gestionados = Math.max(totalPuntos - pendientes, 0);
      const avance = totalPuntos > 0 ? Math.round((gestionados / totalPuntos) * 100) : 0;

      return {
        totalPuntos,
        pendientes,
        entregados,
        parciales,
        rechazados,
        gestionados,
        avance
      };
    }

    function renderInicio() {
      const resumen = state.resumen || {};
      const estado = calcularEstadoRuta();

      const html = `
        <div class="progress-card">
          <div class="progress-title">
            <span>Progreso de ruta</span>
            <span>${estado.gestionados}/${estado.totalPuntos} puntos</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${estado.avance}%"></div>
          </div>
          <div style="margin-top:8px;font-size:11px;color:#64748b;font-weight:800;">
            Avance: ${estado.avance}%
          </div>
        </div>

        <div class="quick-grid">
          <div class="quick-card"><b>${estado.pendientes}</b><span>Puntos pendientes</span></div>
          <div class="quick-card"><b>${estado.entregados}</b><span>Entregados</span></div>
          <div class="quick-card"><b>${resumen.facturas || 0}</b><span>Facturas</span></div>
          <div class="quick-card"><b>${resumen.productos || 0}</b><span>Productos</span></div>
          <div class="quick-card"><b>${formatoNum.format(resumen.totalPesoKg || 0)}</b><span>Peso kg</span></div>
          <div class="quick-card"><b>${formatoNum.format(resumen.totalPallets || 0)}</b><span>Pallets</span></div>
          <div class="quick-card"><b>${formatoNum.format(resumen.totalVolumenM3 || 0)}</b><span>Volumen m3</span></div>
          <div class="quick-card"><b>${formatoGs.format(resumen.totalImporte || 0)}</b><span>Importe Gs.</span></div>
        </div>

        <div class="action-stack">
          <button class="btn-primary" onclick="window.cambiarVista('ruta')">📋 Ver mi ruta</button>
          <button class="btn-success" onclick="window.cambiarVista('mapa')">🗺️ Ver mapa</button>
          <button class="btn-secondary" onclick="window.refrescarRuta()">🔄 Sincronizar datos</button>
        </div>
      `;

      document.getElementById("inicioContent").innerHTML = html;
    }

    function renderRuta() {
      const filtro = state.filtroRuta || "TODOS";

      let lista = [...state.paradas].sort((a, b) => {
        return toNumber(a.OrdenPlanificado) - toNumber(b.OrdenPlanificado);
      });

      if (filtro !== "TODOS") {
        lista = lista.filter(p => {
          const estado = cleanEstado(p.EstadoParada || "PENDIENTE");

          if (filtro === "PENDIENTE") return estado === "PENDIENTE";
          if (filtro === "ENTREGADO") return estado === "ENTREGADO";
          if (filtro === "PARCIAL") return estado === "PARCIAL";
          if (filtro === "RECHAZADO") return estado === "RECHAZADO" || estado === "NO_DESPACHADO";

          return true;
        });
      }

      const filtros = ["TODOS", "PENDIENTE", "ENTREGADO", "PARCIAL", "RECHAZADO"];

      const html = `
        <div class="route-filters">
          ${filtros.map(f => `
            <button class="filter-chip ${filtro === f ? "active" : ""}" onclick="window.filtrarRuta('${f}')">
              ${f}
            </button>
          `).join("")}
        </div>

        ${lista.length ? lista.map(p => renderParadaCard(p)).join("") : `
          <div class="empty-state">
            No hay paradas para el filtro seleccionado.
          </div>
        `}
      `;

      document.getElementById("rutaContent").innerHTML = html;
    }

    function renderParadaCard(p) {
      const estado = cleanEstado(p.EstadoParada || "PENDIENTE");
      const lat = p.Latitud || "";
      const lon = p.Longitud || "";

      return `
        <div class="stop-card">
          <div class="stop-top">
            <div class="stop-order">${escapeHtml(p.OrdenPlanificado || "-")}</div>
            <div class="stop-main">
              <div class="stop-name">${escapeHtml(p.Cliente || p.Boca || "Cliente")}</div>
              <div class="stop-meta">
                CodBoca: ${escapeHtml(p.CodBoca || "")}<br>
                ${escapeHtml(p.Ciudad || "")} | ${escapeHtml(p.Zona || "")}<br>
                Facturas: ${p.CantidadFacturas || 0} | Productos: ${p.CantidadProductos || 0}<br>
                Peso: ${formatoNum.format(toNumber(p.TotalPesoKg))} kg |
                Pallets: ${formatoNum.format(toNumber(p.TotalPallets))}
              </div>
            </div>
            <span class="badge ${estado}">${estado}</span>
          </div>

          <div class="stop-actions">
            <button class="btn-primary" onclick="window.abrirParadaDesdeLista('${escapeAttr(p.ParadaID || "")}', '${escapeAttr(p.CodBoca || "")}', '${escapeAttr(p.RutaID || "")}')">
              Gestionar
            </button>
            <a class="link-gps" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}">
              Ir con GPS
            </a>
          </div>
        </div>
      `;
    }

    window.filtrarRuta = function(filtro) {
      state.filtroRuta = filtro;
      renderRuta();
    };

    window.abrirParadaDesdeLista = function(paradaId, codBoca, rutaId) {
      window.abrirParada(paradaId, codBoca, rutaId);
    };

    function renderCierre() {
      const estado = calcularEstadoRuta();

      const bloqueEstado = estado.pendientes > 0
        ? `
          <div class="cierre-warning">
            No puedes cerrar la ruta todavía.<br><br>
            Pendientes: <b>${estado.pendientes}</b> puntos.<br>
            Gestionados: <b>${estado.gestionados}</b> de <b>${estado.totalPuntos}</b>.
          </div>
        `
        : `
          <div class="cierre-ok">
            Ruta lista para cierre.<br><br>
            Todos los puntos están gestionados.
          </div>
        `;

      const html = `
        ${bloqueEstado}

        <div class="quick-grid">
          <div class="quick-card"><b>${estado.totalPuntos}</b><span>Total puntos</span></div>
          <div class="quick-card"><b>${estado.gestionados}</b><span>Gestionados</span></div>
          <div class="quick-card"><b>${estado.pendientes}</b><span>Pendientes</span></div>
          <div class="quick-card"><b>${estado.avance}%</b><span>Avance</span></div>
        </div>

        <div class="action-stack">
          <button class="btn-danger" onclick="window.finalizarRuta()">🏁 Finalizar ruta</button>
          <button class="btn-secondary" onclick="window.cambiarVista('ruta')">Ver pendientes</button>
          <button class="btn-secondary" onclick="window.refrescarRuta()">🔄 Sincronizar</button>
        </div>
      `;

      document.getElementById("cierreContent").innerHTML = html;
    }

    window.refrescarRuta = async function() {
      if (!state.ci || !state.chapa || !state.fecha) return;
      await cargarRutaChofer(false);
    };

    function setLoginMsg(text, isError) {
      const el = document.getElementById("loginMsg");
      el.textContent = text;
      el.className = isError ? "login-msg error" : "login-msg";
    }

    function actualizarPanelChofer() {
      const chofer = state.chofer || {};
      const movil = state.movil || {};
      const resumen = state.resumen || {};

      document.getElementById("driverName").textContent = chofer.chofer || "Chofer";
      document.getElementById("driverMeta").innerHTML =
        `CI: ${chofer.ci || ""}<br>` +
        `Transportadora: ${chofer.transportadora || ""}<br>` +
        `Chapa: ${movil.chapa || ""} | Fecha: ${state.fecha}`;

      document.getElementById("statPuntos").textContent = resumen.puntos || state.paradas.length || 0;
      document.getElementById("statFacturas").textContent = resumen.facturas || 0;
      document.getElementById("statPeso").textContent = formatoNum.format(resumen.totalPesoKg || 0);
      document.getElementById("statPallets").textContent = formatoNum.format(resumen.totalPallets || 0);
    }

    function dibujarMapa() {
      layerGroup.clearLayers();

      if (!state.paradas.length) {
        toast("No hay paradas para esta ruta.", "error");
        return;
      }

      const bounds = [];

      state.paradas.forEach(parada => {
        const lat = toNumber(parada.Latitud);
        const lon = toNumber(parada.Longitud);

        if (!lat || !lon) return;

        bounds.push([lat, lon]);

        const estado = cleanEstado(parada.EstadoParada || "PENDIENTE");
        const color = colorPorEstado(estado);

        const html = `
          <div style="position:relative;">
            <svg width="34" height="34" viewBox="0 0 24 24" style="filter:drop-shadow(0px 2px 2px rgba(0,0,0,0.3))">
              <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22S19 14.25 19 9C19 5.13 15.87 2 12 2Z" fill="${color}"></path>
              <circle cx="12" cy="9" r="3.5" fill="white"></circle>
            </svg>
          </div>
        `;

        const marker = L.marker([lat, lon], {
          icon: L.divIcon({
            className: "custom-marker",
            html,
            iconSize: [34, 34],
            iconAnchor: [17, 34]
          })
        }).addTo(layerGroup);

        marker.bindTooltip(
          `<div>${escapeHtml(parada.OrdenPlanificado || "")}. ${escapeHtml(parada.Cliente || parada.Boca || "")}</div>`,
          { permanent: true, direction: "right", className: "label-boca", offset: [15, -15] }
        );

        marker.bindPopup(crearPopupParada(parada));

        marker.on("click", () => {
          state.paradaActiva = parada;
        });
      });

      if (bounds.length) {
        map.fitBounds(bounds, { padding: [40, 40] });
      }

      document.getElementById("apiStatus").textContent = `${state.paradas.length} puntos cargados`;
    }

    function crearPopupParada(p) {
      const estado = cleanEstado(p.EstadoParada || "PENDIENTE");

      return `
        <div class="popup-card">
          <div class="popup-title">${escapeHtml(p.Cliente || p.Boca || "Cliente")}</div>
          <div class="popup-meta">
            CodBoca: ${escapeHtml(p.CodBoca || "")}<br>
            Ciudad: ${escapeHtml(p.Ciudad || "")}<br>
            Facturas: ${p.CantidadFacturas || 0} | Productos: ${p.CantidadProductos || 0}<br>
            Peso: ${formatoNum.format(toNumber(p.TotalPesoKg))} kg<br>
            Estado: <span class="badge ${estado}">${estado}</span>
          </div>
          <button class="popup-btn" onclick="window.abrirParada('${escapeAttr(p.ParadaID || "")}', '${escapeAttr(p.CodBoca || "")}', '${escapeAttr(p.RutaID || "")}')">
            Ver facturas
          </button>
          <a class="popup-btn" style="display:block;text-align:center;text-decoration:none;margin-top:8px;" target="_blank"
            href="https://www.google.com/maps/dir/?api=1&destination=${p.Latitud},${p.Longitud}">
            Ir con GPS
          </a>
        </div>
      `;
    }

    window.abrirParada = async function(paradaId, codBoca, rutaId) {
      const parada = state.paradas.find(p =>
        String(p.ParadaID || "") === paradaId ||
        (String(p.CodBoca || "") === codBoca && String(p.RutaID || "") === rutaId)
      );

      if (!parada) {
        toast("No se encontró la parada.", "error");
        return;
      }

      state.paradaActiva = parada;

      document.getElementById("sideTitle").textContent = parada.Cliente || parada.Boca || "Cliente";
      document.getElementById("sideSubtitle").innerHTML =
        `CodBoca: ${escapeHtml(parada.CodBoca || "")}<br>` +
        `Ciudad: ${escapeHtml(parada.Ciudad || "")} | Estado: ${escapeHtml(parada.EstadoParada || "PENDIENTE")}`;

      abrirPanel();
      setSideBody("Cargando facturas...");

      try {
        const data = await apiGet({
          mode: "getFacturasParada",
          paradaId: parada.ParadaID || "",
          rutaId: parada.RutaID || "",
          codBoca: parada.CodBoca || "",
          fecha: state.fecha
        });

        if (!data.ok) {
          setSideBody(data.mensaje || "No se pudieron cargar las facturas.");
          return;
        }

        state.facturasCache[parada.ParadaID] = data.data || [];
        renderFacturas(data.data || []);

      } catch (error) {
        setSideBody("Error al cargar facturas:\n" + error.message);
      }
    };

    function renderFacturas(facturas) {
      if (!facturas.length) {
        setSideBody("No hay facturas para esta parada.");
        return;
      }

      const html = `
        <div class="section-title">Facturas de la parada</div>
        ${facturas.map(f => {
          const estado = cleanEstado(f.EstadoFactura || "PENDIENTE");

          return `
            <div class="card">
              <div class="card-header">
                <div>
                  <div class="card-title">Factura ${escapeHtml(f.NumFactura || "")}</div>
                  <div class="card-meta">
                    Pedido: ${escapeHtml(f.NumPedido || "")}<br>
                    Productos: ${f.CantidadProductos || 0}<br>
                    Peso: ${formatoNum.format(toNumber(f.TotalPesoKg))} kg |
                    Importe: Gs. ${formatoGs.format(toNumber(f.TotalImporte))}
                  </div>
                </div>
                <span class="badge ${estado}">${estado}</span>
              </div>

              <div class="btn-row">
                <button class="btn-success" onclick="window.confirmarFactura('${escapeAttr(f.FacturaID || "")}')">Confirmar completa</button>
                <button class="btn-secondary" onclick="window.verProductos('${escapeAttr(f.FacturaID || "")}')">Gestionar productos</button>
              </div>

              <div class="btn-row">
                <button class="btn-danger" onclick="window.rechazarFactura('${escapeAttr(f.FacturaID || "")}')">Rechazar total</button>
                <button class="btn-neutral" onclick="window.noDespachadoFactura('${escapeAttr(f.FacturaID || "")}')">No despachada</button>
              </div>
            </div>
          `;
        }).join("")}
      `;

      setSideBody(html);
    }

    window.verProductos = async function(facturaId) {
      state.facturaActiva = facturaId;
      setSideBody("Cargando productos...");

      try {
        const data = await apiGet({
          mode: "getProductosFactura",
          facturaId
        });

        if (!data.ok) {
          setSideBody(data.mensaje || "No se pudieron cargar los productos.");
          return;
        }

        state.productosCache[facturaId] = data.data || [];
        renderProductos(facturaId, data.data || []);

      } catch (error) {
        setSideBody("Error al cargar productos:\n" + error.message);
      }
    };

    function renderProductos(facturaId, productos) {
      if (!productos.length) {
        setSideBody("No hay productos para esta factura.");
        return;
      }

      const factura = buscarFactura(facturaId);
      const titulo = factura ? `Factura ${factura.NumFactura}` : "Productos";

      const paradaId = state.paradaActiva ? state.paradaActiva.ParadaID || "" : "";
      const codBoca = state.paradaActiva ? state.paradaActiva.CodBoca || "" : "";
      const rutaId = state.paradaActiva ? state.paradaActiva.RutaID || "" : "";

      const html = `
        <button class="btn-secondary" style="margin-bottom:10px;" onclick="window.abrirParada('${escapeAttr(paradaId)}', '${escapeAttr(codBoca)}', '${escapeAttr(rutaId)}')">
          ← Volver a facturas
        </button>

        <div class="section-title">${escapeHtml(titulo)}</div>

        ${productos.map(p => {
          const estado = cleanEstado(p.EstadoProducto || "PENDIENTE");

          return `
            <div class="card">
              <div class="card-header">
                <div>
                  <div class="card-title">${escapeHtml(p.ProductoMaestro || p.DescripcionProducto || "Producto")}</div>
                  <div class="card-meta">
                    Código: ${escapeHtml(p.CodProducto || "")}<br>
                    Planificado: ${formatoNum.format(toNumber(p.CantidadPlanificada))} ${escapeHtml(p.UnidadMedida || "")}<br>
                    Unidades: ${formatoNum.format(toNumber(p.CantidadUnidades))}<br>
                    Cajas: ${formatoNum.format(toNumber(p.CajasCalculadas))} |
                    Pallets: ${formatoNum.format(toNumber(p.PalletsCalculados))}<br>
                    Peso: ${formatoNum.format(toNumber(p.PesoKgCalculado))} kg
                  </div>
                </div>
                <span class="badge ${estado}">${estado}</span>
              </div>

              <div class="product-line">
                Entregado: ${p.CantidadEntregada || "-"} |
                Rechazado: ${p.CantidadRechazada || "-"}<br>
                Motivo: ${escapeHtml(p.MotivoProducto || "-")}
              </div>

              <div class="btn-row-4">
                <button class="btn-success" onclick="window.actualizarProducto('${escapeAttr(p.ProductoFacturaID || "")}', 'ENTREGADO_TOTAL')">Total</button>
                <button class="btn-warning" onclick="window.actualizarProducto('${escapeAttr(p.ProductoFacturaID || "")}', 'ENTREGADO_PARCIAL')">Parcial</button>
                <button class="btn-danger" onclick="window.actualizarProducto('${escapeAttr(p.ProductoFacturaID || "")}', 'RECHAZADO_TOTAL')">Rechazo</button>
                <button class="btn-neutral" onclick="window.actualizarProducto('${escapeAttr(p.ProductoFacturaID || "")}', 'NO_DESPACHADO')">N/D</button>
              </div>
            </div>
          `;
        }).join("")}
      `;

      setSideBody(html);
    }

    window.confirmarFactura = async function(facturaId) {
      if (!confirm("¿Confirmar factura completa como entregada?")) return;
      await ejecutarAccionFactura("confirmarFacturaCompleta", facturaId, "");
    };

    window.rechazarFactura = async function(facturaId) {
      const motivo = prompt("Motivo del rechazo total:");
      if (motivo === null) return;
      if (!motivo.trim()) {
        toast("Debe ingresar motivo.", "error");
        return;
      }
      await ejecutarAccionFactura("rechazarFacturaCompleta", facturaId, motivo.trim());
    };

    window.noDespachadoFactura = async function(facturaId) {
      const motivo = prompt("Motivo de no despachado:");
      if (motivo === null) return;
      if (!motivo.trim()) {
        toast("Debe ingresar motivo.", "error");
        return;
      }
      await ejecutarAccionFactura("noDespachadoFactura", facturaId, motivo.trim());
    };

    async function ejecutarAccionFactura(mode, facturaId, motivo) {
      try {
        toast("Capturando ubicación...");
        const gps = await obtenerGPS();

        const data = await apiGet({
          mode,
          ci: state.ci,
          chapa: state.chapa,
          fecha: state.fecha,
          facturaId,
          motivo,
          lat: gps.lat,
          lng: gps.lng,
          precision: gps.precision
        });

        if (!data.ok) {
          toast(data.mensaje || "No se pudo actualizar la factura.", "error");
          return;
        }

        toast(data.mensaje || "Factura actualizada.", "ok");
        await refrescarDespuesDeGestion();

      } catch (error) {
        toast("Error:\n" + error.message, "error");
      }
    }

    window.actualizarProducto = async function(productoFacturaId, estado) {
      let cantidadEntregada = "";
      let motivo = "";

      if (estado === "ENTREGADO_PARCIAL") {
        cantidadEntregada = prompt("Cantidad entregada:");
        if (cantidadEntregada === null) return;

        motivo = prompt("Motivo de entrega parcial:");
        if (motivo === null) return;

        if (!motivo.trim()) {
          toast("Debe ingresar motivo.", "error");
          return;
        }
      }

      if (estado === "RECHAZADO_TOTAL") {
        motivo = prompt("Motivo del rechazo total:");
        if (motivo === null) return;

        if (!motivo.trim()) {
          toast("Debe ingresar motivo.", "error");
          return;
        }
      }

      if (estado === "NO_DESPACHADO") {
        motivo = prompt("Motivo de no despachado:");
        if (motivo === null) return;

        if (!motivo.trim()) {
          toast("Debe ingresar motivo.", "error");
          return;
        }
      }

      try {
        toast("Capturando ubicación...");
        const gps = await obtenerGPS();

        const data = await apiGet({
          mode: "actualizarProducto",
          ci: state.ci,
          chapa: state.chapa,
          fecha: state.fecha,
          productoFacturaId,
          estadoProducto: estado,
          cantidadEntregada,
          motivo,
          lat: gps.lat,
          lng: gps.lng,
          precision: gps.precision
        });

        if (!data.ok) {
          toast(data.mensaje || "No se pudo actualizar el producto.", "error");
          return;
        }

        toast(data.mensaje || "Producto actualizado.", "ok");
        await refrescarDespuesDeGestion();

      } catch (error) {
        toast("Error:\n" + error.message, "error");
      }
    };

    async function refrescarDespuesDeGestion() {
      const vistaAnterior = state.vistaActiva || "ruta";
      const facturaAnterior = state.facturaActiva;
      const paradaAnterior = state.paradaActiva;

      await cargarRutaChofer(false);

      renderInicio();
      renderRuta();
      renderCierre();
      window.cambiarVista(vistaAnterior);

      if (facturaAnterior) {
        await verProductos(facturaAnterior);
      } else if (paradaAnterior) {
        await abrirParada(
          paradaAnterior.ParadaID || "",
          paradaAnterior.CodBoca || "",
          paradaAnterior.RutaID || ""
        );
      }
    }

    window.finalizarRuta = async function() {
      if (!confirm("¿Desea finalizar la ruta? Solo se permitirá si no existen pendientes.")) return;

      try {
        toast("Validando pendientes...");
        const gps = await obtenerGPS();

        const data = await apiGet({
          mode: "finalizarRuta",
          ci: state.ci,
          chapa: state.chapa,
          fecha: state.fecha,
          lat: gps.lat,
          lng: gps.lng,
          precision: gps.precision
        });

        if (!data.ok) {
          const pendientes = data.pendientes || {};
          let msg = data.mensaje || "No se puede cerrar la ruta.";

          msg += `\n\nParadas pendientes: ${pendientes.paradas || 0}`;
          msg += `\nFacturas pendientes: ${pendientes.facturas || 0}`;
          msg += `\nProductos pendientes: ${pendientes.productos || 0}`;

          if (data.primerosPendientes && data.primerosPendientes.length) {
            msg += "\n\nPrimeros pendientes:";
            data.primerosPendientes.forEach(p => {
              msg += `\n- Fact ${p.NumFactura || ""} | ${p.Boca || ""} | ${p.CodProducto || ""}`;
            });
          }

          toast(msg, "error");
          renderCierre();
          return;
        }

        toast(data.mensaje || "Ruta cerrada correctamente.", "ok");
        await cargarRutaChofer(false);

      } catch (error) {
        toast("Error al finalizar ruta:\n" + error.message, "error");
      }
    };

    window.activarGPS = function() {
      if (!navigator.geolocation) {
        toast("GPS no disponible en este dispositivo.", "error");
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          if (userMarker) {
            userMarker.setLatLng([lat, lng]);
          } else {
            userMarker = L.circleMarker([lat, lng], {
              radius: 8,
              color: "#0ea5e9",
              fillColor: "#38bdf8",
              fillOpacity: 0.9
            }).addTo(map);
          }

          map.setView([lat, lng], 16);
          toast("Ubicación detectada.", "ok");
        },
        err => {
          toast("No se pudo obtener ubicación: " + err.message, "error");
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
      );
    };

    function obtenerGPS() {
      return new Promise(resolve => {
        if (!navigator.geolocation) {
          resolve({ lat: "", lng: "", precision: "" });
          return;
        }

        navigator.geolocation.getCurrentPosition(
          pos => {
            resolve({
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              precision: pos.coords.accuracy || ""
            });
          },
          () => {
            resolve({ lat: "", lng: "", precision: "" });
          },
          { enableHighAccuracy: true, timeout: 12000, maximumAge: 10000 }
        );
      });
    }

    window.salir = function() {
      if (!confirm("¿Cambiar de chofer?")) return;

      state.ci = "";
      state.chapa = "";
      state.fecha = "";
      state.chofer = null;
      state.movil = null;
      state.resumen = null;
      state.paradas = [];
      state.paradasMap = {};
      state.facturasCache = {};
      state.productosCache = {};
      state.paradaActiva = null;
      state.facturaActiva = null;
      state.vistaActiva = "inicio";
      state.filtroRuta = "TODOS";

      layerGroup.clearLayers();
      cerrarPanel();

      document.getElementById("topPanel").classList.remove("active");
      document.getElementById("appShell").classList.remove("active");
      document.getElementById("bottomNav").classList.remove("active");
      document.getElementById("loginScreen").style.display = "flex";

      setLoginMsg("Ingrese CI, chapa y fecha para consultar la ruta asignada.", false);
    };

    function buscarFactura(facturaId) {
      const listas = Object.values(state.facturasCache);
      for (const lista of listas) {
        const f = lista.find(x => String(x.FacturaID) === String(facturaId));
        if (f) return f;
      }
      return null;
    }

    function abrirPanel() {
      document.getElementById("sidePanel").classList.add("active");
    }

    window.cerrarPanel = function() {
      document.getElementById("sidePanel").classList.remove("active");
      state.facturaActiva = null;
    };

    function setSideBody(html) {
      document.getElementById("sideBody").innerHTML = html;
    }

    function toast(msg, type) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.className = "toast active" + (type ? " " + type : "");

      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => {
        el.className = "toast";
      }, type === "error" ? 8000 : 3000);
    }

    function colorPorEstado(estado) {
      estado = cleanEstado(estado);

      if (estado === "ENTREGADO" || estado === "ENTREGADO_TOTAL") return "#22c55e";
      if (estado === "PARCIAL" || estado === "ENTREGADO_PARCIAL") return "#f59e0b";
      if (estado === "RECHAZADO" || estado === "RECHAZADO_TOTAL") return "#ef4444";
      if (estado === "NO_DESPACHADO") return "#64748b";
      return "#0284c7";
    }

    function cleanEstado(v) {
      return String(v || "PENDIENTE").trim().toUpperCase().replace(/\s+/g, "_");
    }

    function toNumber(v) {
      if (typeof v === "number") return isNaN(v) ? 0 : v;

      let txt = String(v || "").trim().replace(/\s/g, "");
      if (!txt) return 0;

      if (txt.includes(",") && txt.includes(".")) {
        txt = txt.replace(/\./g, "").replace(",", ".");
      } else {
        txt = txt.replace(",", ".");
      }

      txt = txt.replace(/[^0-9.-]/g, "");
      const n = parseFloat(txt);
      return isNaN(n) ? 0 : n;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }
  </script>
</body>
</html>
