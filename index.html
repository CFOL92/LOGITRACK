<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LOGITRACK" />

  <title>LOGITRACK | Control de Ruta</title>

  <!-- Leaflet Mapa -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- LOGITRACK CSS MODULAR - v1.7 -->
  <link rel="stylesheet" href="./css/base.css?v=1.7">
  <link rel="stylesheet" href="./css/login.css?v=1.7">
  <link rel="stylesheet" href="./css/app-shell.css?v=1.7">
  <link rel="stylesheet" href="./css/ruta.css?v=1.7">
  <link rel="stylesheet" href="./css/mapa.css?v=1.7">
  <link rel="stylesheet" href="./css/panel.css?v=1.7">
  <link rel="stylesheet" href="./css/responsive.css?v=1.7">
</head>

<body class="zoom-low" data-build="v1.7">

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">🚚</div>
        <div>
          <h1>LOGITRACK</h1>
          <small>Control de ruta por chofer</small>
        </div>
      </div>

      <div class="form-group">
        <label for="ciInput">Cédula de identidad</label>
        <input
          id="ciInput"
          type="text"
          inputmode="numeric"
          placeholder="Ej: 1234567"
          autocomplete="off"
        />
      </div>

      <div class="form-group">
        <label for="chapaInput">Chapa del móvil</label>
        <input
          id="chapaInput"
          type="text"
          placeholder="Ej: AAHT556"
          autocomplete="off"
          autocapitalize="characters"
        />
      </div>

      <div class="form-group">
        <label for="fechaInput">Fecha de ruta</label>
        <input id="fechaInput" type="date" />
      </div>

      <div class="remember-session-row">
        <label class="remember-session-label">
          <input id="rememberSessionInput" type="checkbox" checked />
          <span>Mantener sesión activa en este dispositivo</span>
        </label>
      </div>

      <button id="btnLogin" type="button" class="btn-primary" onclick="window.cargarRutaChofer(true)">
        Cargar mi ruta
      </button>

      <div id="loginMsg" class="login-msg">
        Ingrese CI, chapa y fecha para consultar la ruta asignada.
      </div>
    </div>
  </div>

  <div id="appShell" class="app-shell">
    <div class="app-header">
      <div class="app-title-row">
        <div>
          <div class="app-title">LOGITRACK</div>
          <div id="appDriverMeta" class="app-subtitle">Ruta no cargada</div>
        </div>

        <div class="app-header-actions">
          <div id="appRouteStatus" class="route-pill">Ruta activa</div>

          <button id="btnCerrarSesionHeader" type="button" class="btn-logout-header" onclick="window.cerrarSesion()">
            Cerrar sesión
          </button>
        </div>
      </div>
    </div>

    <div id="viewInicio" class="app-view">
      <div id="inicioContent"></div>
    </div>

    <div id="viewRuta" class="app-view">
      <div id="rutaContent"></div>
    </div>

    <div id="viewCierre" class="app-view">
      <div id="cierreContent"></div>
    </div>
  </div>

  <nav id="bottomNav" class="bottom-nav">
    <button id="navInicio" type="button" class="nav-item active" onclick="window.cambiarVista('inicio')">
      <span class="nav-icon">🏠</span>
      Inicio
    </button>

    <button id="navRuta" type="button" class="nav-item" onclick="window.cambiarVista('ruta')">
      <span class="nav-icon">📋</span>
      Ruta
    </button>

    <button id="navMapa" type="button" class="nav-item" onclick="window.cambiarVista('mapa')">
      <span class="nav-icon">🗺️</span>
      Mapa
    </button>

    <button id="navCierre" type="button" class="nav-item" onclick="window.cambiarVista('cierre')">
      <span class="nav-icon">🏁</span>
      Cierre
    </button>
  </nav>

  <div id="topPanel" class="top-panel">
    <div class="driver-box">
      <div id="driverName" class="driver-name">Sin chofer</div>
      <div id="driverMeta" class="driver-meta">Sin ruta cargada</div>
    </div>

    <div class="stats-grid">
      <div class="stat">
        <b id="statPuntos">0</b>
        <span>Puntos</span>
      </div>

      <div class="stat">
        <b id="statFacturas">0</b>
        <span>Facturas</span>
      </div>

      <div class="stat">
        <b id="statPeso">0</b>
        <span>Kg</span>
      </div>

      <div class="stat">
        <b id="statPallets">0</b>
        <span>Pallets</span>
      </div>
    </div>

    <div class="panel-actions">
      <button id="btnActivarGPS" type="button" class="btn-success" onclick="window.activarGPS()">
        📍 Mi ubicación
      </button>

      <button id="btnRefrescarRuta" type="button" class="btn-secondary" onclick="window.refrescarRuta()">
        🔄 Refrescar ruta
      </button>

      <button id="btnFinalizarRuta" type="button" class="btn-danger" onclick="window.finalizarRuta()">
        🏁 Finalizar ruta
      </button>

      <button id="btnCerrarSesionPanel" type="button" class="btn-secondary" onclick="window.cerrarSesion()">
        Cerrar sesión
      </button>
    </div>

    <div id="apiStatus" class="status-line">API: CONECTANDO...</div>
  </div>

  <div id="sidePanel" class="side-panel">
    <div class="side-header">
      <div>
        <h2 id="sideTitle" class="side-title">Detalle</h2>
        <div id="sideSubtitle" class="side-subtitle"></div>
      </div>

      <button id="btnCerrarPanel" type="button" class="side-close" onclick="window.cerrarPanel()">×</button>
    </div>

    <div id="sideBody" class="side-body"></div>
  </div>

  <div id="map"></div>
  <div id="toast" class="toast"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- LOGITRACK JS MODULAR - v1.7 -->
  <script type="module" src="./js/main.js?v=1.7"></script>
</body>
</html>
